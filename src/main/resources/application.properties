spring.application.name=siteflow-backend

# Local secrets are loaded from the ignored .env file.
spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8088}

spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:55432}/${POSTGRES_DB:siteflow}
spring.datasource.username=${POSTGRES_USER:siteflow}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
