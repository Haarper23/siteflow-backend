name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Java 21, PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: siteflow
          POSTGRES_USER: siteflow
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U siteflow -d siteflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_DB: siteflow
      POSTGRES_USER: siteflow
      POSTGRES_PASSWORD: ci-only-password
      POSTGRES_PORT: 5432
      SERVER_PORT: 0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: pom.xml

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run tests and verify build
        run: ./mvnw --batch-mode --no-transfer-progress clean verify
